name: Deploy

# Manual trigger keeps deploys deliberate. Change to `push` on main, or gate on a
# successful CI run via `workflow_run`, once you are comfortable auto-deploying.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            git pull --ff-only
            docker compose build
            docker compose up -d
            docker image prune -f
