global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: eventshare-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api:8080']

  - job_name: eventshare-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['worker:8081']

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ['rabbitmq:15692']
